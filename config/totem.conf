CONFIG_ZMK_USB_LOGGING=n

# Pointing/mouse functionality
## Enable the general pointing/mouse functionality
CONFIG_ZMK_POINTING=y
## Enable smooth scrolling HID functionality (via HID Resolution Multipliers)
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# BT
## Enable the Bluetooth BAS (battery reporting service)
CONFIG_BT_BAS=y
## Enable central reporting of split battery levels to hosts (n - default)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
## Enable fetching split peripheral battery levels to the central side (n - default)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Increase BT power to increase range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
