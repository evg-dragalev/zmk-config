CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y

# BT
#CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=n
#CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
## Enable passkey entry during pairing for enhanced security.
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y
CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=y
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_Z_MEM_POOL_SIZE=8192

# N-key roll over (n - default; if disabled - hkey rollover is set instead, to 6 keys by default)
#CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n
## When CONFIG_ZMK_HID_REPORT_TYPE_NKRO enabled, enable less frequently used key usages (ex. f13-f18...), at the cost of compatibility
#CONFIG_ZMK_HID_KEYBOARD_NKRO_EXTENDED_REPORT=n

# Other
## Should never use clear_bonds_on_start as it only used for development purposes
#CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
